<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body bgcolor = "grey">
    <pre>
        gwerggrewg                    rgerhghh
        efewfgwe                 xxxxxxxx
    </pre>

    <hr>
    <hr>

    xxx
    <br>
    xx
    <br>

    <u> xxxxxx </u>
    <i> xxxxxx </i>
    <b> xxxxxx </b>
    <s> xxxxxx </s>
    <strong> xxxxxxx </strong>
    <br>

    <font size = 10%>xxxxx</font>
    <font size = 10% color = "red">xxxxx</font>
    <font size = 10% color = "red" face = "Courier New">xxxxx</font>

    <!-- tabelka z wyrównaniem do góry i kolorem zółtym -->
    <table border>
        <tr>
            <td width = 100 height = 50 align = right  valign = "top" bgcolor = "yellow">
                vvvvv
            </td>
        </tr>
    </table>
    
    <!-- wyrównanie tekstu tylko w paragrafie -->
    <p align = "right">
        fffff
    </p>

    a <sup>
        xxxx
    </sup> a

    b <sub>
        xxxx
    </sub> b

    <!-- tabela składa się z wierszy, a wiersze z komórek -->
    <!-- cellspacing : odległość między komórkami (wszystkie kierunki) -->
    <table border cellspacing = 50>
        <tr>
            <td>
                1
            </td>
            <td>
                2
            </td>
        </tr>
        <td>
            11
        </td>
        <td>
            22
        </td>
    </table>

    <!-- cellpadding : an attribute for the table element (used for td and th elements). It defines the space between the cell's edges/walls and its content -->
    <table border cellpadding = 50>
        <tr>
            <td>
                1
            </td>
            <td>
                2
            </td>
        </tr>
        <td>
            11
        </td>
        <td>
            22
        </td>
    </table>

    <!-- rowspan : an attribute of the <td> (table data) or <th> (table header) elements that specifies the number of rows the cell should span -->
    <!-- colspan : specifies the number of columns a cell should span -->
    <table border cellpadding = 50>
        <tr>
            <td rowspan = 2>
                1
            </td>
            <td>
                2
            </td>
        </tr>
        <td>
            11
        </td>
        <td>
            22
        </td>


    </table>
</body>
</html>
