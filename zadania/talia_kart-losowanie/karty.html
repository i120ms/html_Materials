<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            float: left;
        }
        div{
            width: 100%;
            height: 150px;
        }
    </style>
</head>
<body>
    <div id="kontener1"></div>
    <div id="kontener2"></div>
    <div id="kontener3"></div>
    <div id="kontener4"></div>
    <script>
        const kontener1=document.getElementById("kontener1");
        const kontener2=document.getElementById("kontener2");
        const kontener3=document.getElementById("kontener3");
        const kontener4=document.getElementById("kontener4");
        const c = ["2_of_clubs.png", "2_of_diamonds.png", "2_of_hearts.png", "2_of_spades.png","3_of_clubs.png", "3_of_diamonds.png", "3_of_hearts.png", "3_of_spades.png","4_of_clubs.png", "4_of_diamonds.png", "4_of_hearts.png", "4_of_spades.png","5_of_clubs.png", "5_of_diamonds.png", "5_of_hearts.png", "5_of_spades.png","6_of_clubs.png", "6_of_diamonds.png", "6_of_hearts.png", "6_of_spades.png","7_of_clubs.png", "7_of_diamonds.png", "7_of_hearts.png", "7_of_spades.png","8_of_clubs.png", "8_of_diamonds.png", "8_of_hearts.png", "8_of_spades.png","9_of_clubs.png", "9_of_diamonds.png", "9_of_hearts.png", "9_of_spades.png","10_of_clubs.png", "10_of_diamonds.png", "10_of_hearts.png", "10_of_spades.png","ace_of_clubs.png", "ace_of_diamonds.png", "ace_of_hearts.png", "ace_of_spades.png","jack_of_clubs.png", "jack_of_clubs2.png", "jack_of_diamonds.png", "jack_of_diamonds2.png","jack_of_hearts.png", "jack_of_hearts2.png", "jack_of_spades.png", "jack_of_spades2.png","queen_of_clubs.png", "queen_of_clubs2.png", "queen_of_diamonds.png", "queen_of_diamonds2.png","queen_of_hearts.png", "queen_of_hearts2.png", "queen_of_spades.png", "queen_of_spades2.png","king_of_clubs.png", "king_of_clubs2.png", "king_of_diamonds.png", "king_of_diamonds2.png","king_of_hearts.png", "king_of_hearts2.png", "king_of_spades.png", "king_of_spades2.png","black_joker.png", "red_joker.png"];
        for (let i = 0; i < 52; i++) {
            const j=Math.floor(Math.random()*c.length);
            [c[i],c[j]]=[c[j],c[i]]
        }


        for (let i = 0; i < 13; i++) {
            const img = document.createElement("img");
            img.width = 50;
            img.src = c[i];
            kontener1.appendChild(img);
        }
        for (let i = 13; i < 26; i++) {
            const img = document.createElement("img");
            img.width = 50;
            img.src = c[i];
            kontener2.appendChild(img);
        }
        for (let i = 26; i < 39; i++) {
            const img = document.createElement("img");
            img.width = 50;
            img.src = c[i];
            kontener3.appendChild(img);
        }
        for (let i = 39; i < 52; i++) {
            const img = document.createElement("img");
            img.width = 50;
            img.src = c[i];
            kontener4.appendChild(img);
        }
    </script>
    <br>
</body>
</html>
