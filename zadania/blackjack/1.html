<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <style>
        #kontener{
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            display: grid;
            grid-template-columns: repeat(5,1fr);
        }

        #kontener>img{
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="table">
        <div class="kontener" id="kontener">

        </div>
        <button onclick="start()">DOBIERAJ</button>
    </div>

    <script>
        const cards = [
            "2_of_clubs.png", "2_of_diamonds.png", "2_of_hearts.png", "2_of_spades.png",
            "3_of_clubs.png", "3_of_diamonds.png", "3_of_hearts.png", "3_of_spades.png",
            "4_of_clubs.png", "4_of_diamonds.png", "4_of_hearts.png", "4_of_spades.png",
            "5_of_clubs.png", "5_of_diamonds.png", "5_of_hearts.png", "5_of_spades.png",
            "6_of_clubs.png", "6_of_diamonds.png", "6_of_hearts.png", "6_of_spades.png",
            "7_of_clubs.png", "7_of_diamonds.png", "7_of_hearts.png", "7_of_spades.png",
            "8_of_clubs.png", "8_of_diamonds.png", "8_of_hearts.png", "8_of_spades.png",
            "9_of_clubs.png", "9_of_diamonds.png", "9_of_hearts.png", "9_of_spades.png",
            "10_of_clubs.png", "10_of_diamonds.png", "10_of_hearts.png", "10_of_spades.png",
            "jack_of_clubs.png", "jack_of_diamonds.png", "jack_of_hearts.png", "jack_of_spades.png",
            "queen_of_clubs.png", "queen_of_diamonds.png", "queen_of_hearts.png", "queen_of_spades.png",
            "king_of_clubs.png", "king_of_diamonds.png", "king_of_hearts.png", "king_of_spades.png",
            "ace_of_clubs.png", "ace_of_diamonds.png", "ace_of_hearts.png", "ace_of_spades.png",
            "black_joker.png", "red_joker.png"
        ];

        let deck = [];
        let losujKarty = [];

        function stworzDeck(){
            deck = [...cards]; // Użyj tablicy z kartami
        }

        function C(){
            const index = Math.floor(Math.random() * deck.length);
            return deck.splice(index, 1)[0]; // Zwróć nazwę karty
        }

        function generujC(){
            const kontener = document.getElementById("kontener");
            kontener.innerHTML = "";

            losujKarty.forEach(card => {
                const img = document.createElement("img");
                img.src = card;  // Bezpośrednie przypisanie nazwy pliku
                kontener.appendChild(img);
            });
        }

        function start(){
            if(losujKarty.length == 0){
                stworzDeck();
                losujKarty.push(C());
                losujKarty.push(C());
            }else{
                if(losujKarty.length < 10){
                    losujKarty.push(C());
                }
            }
            generujC();
        }
    </script>
</body>
</html>
