<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #container{
            width: 306px;
            height: 306px;
        }
        #container > div{
            width: 100px;
            height: 100px;
            border: 1px double gold;
            background-color: skyblue;
            color: black;
            font-size: 50px;
            text-align: center;
            line-height: 100px;
            float: left;
        }
    </style>

    <script>
        let gracz = 1;
        let plansza = [0,0,0,0,0,0,0,0,0];

        function gra(i){
            if(gracz == 1 && plansza[i] == 0){
                document.getElementById("d" + i).innerHTML = "O";
                gracz = 2;
                plansza[i] = 1;
            }
            else if(gracz == 2 && plansza[i] == 0){
                document.getElementById("d" + i).innerHTML = "X";
                gracz = 1;
                plansza[i] = 2;
            }

            // gracz1 : O

            // poziomo
            if(plansza[0] == 1 && plansza[1] == 1 && plansza[2] == 1){
                alert("wygrał gracz1 : O");
            }
            if(plansza[3] == 1 && plansza[4] == 1 && plansza[5] == 1){
                alert("wygrał gracz1 : O");
            }
            if(plansza[6] == 1 && plansza[7] == 1 && plansza[8] == 1){
                alert("wygrał gracz1 : O");
            }

            //pionowo
            if(plansza[0] == 1 && plansza[3] == 1 && plansza[6] == 1){
                alert("wygrał gracz1 : O");
            }
            if(plansza[1] == 1 && plansza[4] == 1 && plansza[7] == 1){
                alert("wygrał gracz1 : O");
            }
            if(plansza[2] == 1 && plansza[5] == 1 && plansza[8] == 1){
                alert("wygrał gracz1 : O");
            }

            //skos
            if(plansza[0] == 1 && plansza[4] == 1 && plansza[8] == 1){
                alert("wygrał gracz1 : O");
            }
            if(plansza[2] == 1 && plansza[4] == 1 && plansza[6] == 1){
                alert("wygrał gracz1 : O");
            }


            //gracz2 : X

            // poziomo
            if(plansza[0] == 2 && plansza[1] == 2 && plansza[2] == 2){
                alert("wygrał gracz2 : X");
            }
            if(plansza[3] == 2 && plansza[4] == 2 && plansza[5] == 2){
                alert("wygrał gracz2 : X");
            }
            if(plansza[6] == 2 && plansza[7] == 2 && plansza[8] == 2){
                alert("wygrał gracz2 : X");
            }

            //pionowo
            if(plansza[0] == 2 && plansza[3] == 2 && plansza[6] == 2){
                alert("wygrał gracz2 : X");
            }
            if(plansza[1] == 2 && plansza[4] == 2 && plansza[7] == 2){
                alert("wygrał gracz2 : X");
            }
            if(plansza[2] == 2 && plansza[5] == 2 && plansza[8] == 2){
                alert("wygrał gracz2 : X");
            }

            //skos
            if(plansza[0] == 2 && plansza[4] == 2 && plansza[8] == 2){
                alert("wygrał gracz2 : X");
            }
            if(plansza[2] == 2 && plansza[4] == 2 && plansza[6] == 2){
                alert("wygrał gracz2 : X");
            }


            // remis
            if(plansza[0] != 0 && plansza[1] != 0 && plansza[2] != 0 && plansza[3] != 0 && plansza[4] != 0 && plansza[5] != 0 && plansza[6] != 0 && plansza[7] != 0 && plansza[8] != 0){
                alert("REMIS!!!");
            }

        }
    </script>
</head>
<body>
    <div id="container">
        <div id="d0" onclick='gra(0)'>0</div>
        <div id="d1" onclick='gra(1)'>1</div>
        <div id="d2" onclick='gra(2)'>2</div>
        <div id="d3" onclick='gra(3)'>3</div>
        <div id="d4" onclick='gra(4)'>4</div>
        <div id="d5" onclick='gra(5)'>5</div>
        <div id="d6" onclick='gra(6)'>6</div>
        <div id="d7" onclick='gra(7)'>7</div>
        <div id="d8" onclick='gra(8)'>8</div>
    </div>
</body>
</html>
