    <script>
        function f1(){
            let tab = [1000, 900, 500, 400, 100, 90, 50, 40, 10, 9, 5, 4, 1];
            let tab2 = ['M', 'CM', 'D', 'CD', 'C', 'XC', 'L', 'XL', 'X', 'IX', 'V', 'IV', 'I'];

            let spn = document.getElementById("spn");

                }
            }
        }    
        }
